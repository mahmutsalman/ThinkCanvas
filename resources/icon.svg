<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272c38"/>
      <stop offset="1" stop-color="#0f1116"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e9883a" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#e9883a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7a64f"/>
      <stop offset="1" stop-color="#e0772a"/>
    </linearGradient>
  </defs>

  <!-- rounded squircle background -->
  <rect x="84" y="84" width="856" height="856" rx="196" fill="url(#bg)"/>
  <rect x="84" y="84" width="856" height="856" rx="196" fill="none"
        stroke="#e9883a" stroke-opacity="0.16" stroke-width="3"/>

  <!-- glow behind the central node -->
  <circle cx="512" cy="512" r="300" fill="url(#glow)"/>

  <!-- dotted connecting edges (echo the canvas's dashed edges) -->
  <g stroke="#e9883a" stroke-width="13" stroke-linecap="round" stroke-dasharray="1 42" opacity="0.9">
    <line x1="512" y1="512" x2="300" y2="340"/>
    <line x1="512" y1="512" x2="716" y2="322"/>
    <line x1="512" y1="512" x2="720" y2="700"/>
  </g>

  <!-- satellite nodes -->
  <circle cx="300" cy="340" r="58" fill="#15181f" stroke="url(#node)" stroke-width="22"/>
  <circle cx="716" cy="322" r="48" fill="url(#node)"/>
  <circle cx="720" cy="700" r="64" fill="#15181f" stroke="url(#node)" stroke-width="22"/>

  <!-- central node -->
  <circle cx="512" cy="512" r="108" fill="url(#node)"/>
  <circle cx="512" cy="512" r="108" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="7"/>
</svg>
