name: build

# Build the Windows installer on a real Windows runner. The native better-sqlite3
# module can't be reliably cross-compiled for Windows from macOS, so CI does it.
on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # postinstall runs electron-builder install-app-deps, which rebuilds
      # better-sqlite3 against Electron's ABI for win32-x64.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run build:win

      - uses: actions/upload-artifact@v4
        with:
          name: thinkcanvas-windows-installer
          path: |
            dist/*.exe
          if-no-files-found: error
